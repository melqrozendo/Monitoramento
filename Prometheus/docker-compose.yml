services:
 app:
  build: .
  container_name: node-app
  ports:
   - "3000:3000"
  networks:
   - monitoramento
 
 prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
    - "9090:9090"
    networks:
    - monitoramento

 grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
    - "3001:3000" # Acessaremos o Grafana na porta 3001
    networks:
    - monitoramento

networks:
  monitoramento:
    driver: bridge